name: Deploy

on:
  workflow_dispatch:
    inputs:
      stage:
        description: Deployment stage
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod
      region:
        description: AWS region
        required: true
        default: us-east-1
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.stage || 'dev' }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy
        run: npx serverless deploy --stage ${{ inputs.stage || 'dev' }} --region ${{ inputs.region || 'us-east-1' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
