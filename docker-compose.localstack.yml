services:
  localstack:
    image: localstack/localstack:3.4
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,sqs,sns,ssm,events
      - DEBUG=0
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-pe:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: localpassword
      MYSQL_DATABASE: appointmentspe
      MYSQL_USER: admin
      MYSQL_PASSWORD: localpassword
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uadmin", "-plocalpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-cl:
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: localpassword
      MYSQL_DATABASE: appointmentscl
      MYSQL_USER: admin
      MYSQL_PASSWORD: localpassword
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uadmin", "-plocalpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  localstack_data:
